<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Project</title>

<style>
body {
    margin:0;
    background:linear-gradient(135deg,#020617,#000000,#020617);
    color:white;
    font-family: Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */
.form-card{
    background:rgba(2,6,23,0.95);
    padding:30px;
    border-radius:20px;
    width:320px;
    box-shadow:0 0 40px rgba(0,0,0,0.9);
    backdrop-filter:blur(10px);
}

/* TITLE */
h2{
    text-align:center;
    margin-bottom:10px;
}

/* INPUT BOX */
.input-box{
    position:relative;
    margin-top:15px;
}

.input-box input,
.input-box select{
    width:100%;
    padding:12px;
    border:none;
    outline:none;
    border-radius:10px;
    background:#0f172a;
    color:white;
    position:relative;
    z-index:2;
}

/* ANIMATED BORDER */
.input-box::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border-radius:10px;
    padding:2px;
    background:linear-gradient(270deg,#38bdf8,#af80d5,#38bdf8);
    background-size:400% 400%;
    z-index:1;
    opacity:0;
    transition:0.3s;
}

.input-box:focus-within::before{
    opacity:1;
    animation:glow 3s linear infinite;
}

@keyframes glow{
    0%{background-position:0%}
    100%{background-position:400%}
}

/* BUTTON */
button{
    margin-top:20px;
    padding:12px;
    width:100%;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:white;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    background:#60d4ff;
    box-shadow:0 0 20px #38bdf8;
}

/* BACK LINK */
.back{
    margin-top:15px;
    text-align:center;
}

.back a{
    color:#38bdf8;
    text-decoration:none;
    transition:0.3s;
}
.flash-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
}

.flash {
    background: #111;
    color: #fff;
    padding: 12px 18px;
    margin-bottom: 10px;
    border-radius: 8px;
    font-size: 14px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    animation: slideIn 0.3s ease;
}

@keyframes slideIn {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
}
.back a:hover{
    text-decoration:underline;
}

/* MOBILE */
@media(max-width:400px){
    .form-card{
        width:90%;
    }
}
</style>
</head>

<body>
    {% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="flash-container">
      {% for message in messages %}
        <div class="flash">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<form action="/update_client/{{ p.id }}" method="POST">

<h2>Edit Project</h2>

<div class="input-box">
<input name="title" value="{{ project.title }}" placeholder="Project Title" required>
</div>

<div class="input-box">
<input name="client_name" value="{{ project.client_name }}" placeholder="Client Name">
</div>

<div class="input-box">
<input name="date" value="{{ project.date }}" placeholder="Date">
</div>

<div class="input-box">
<input name="amount" value="{{ project.amount }}" placeholder="Amount" required>
</div>

<div class="input-box">
<select name="status">
<option value="pending" {% if project.status == "pending" %}selected{% endif %}>Pending</option>
<option value="paid" {% if project.status == "paid" %}selected{% endif %}>Paid</option>
</select>
</div>

<button>Update Project</button>

<div class="back">
<a href="/dashboard">⬅ Back to Dashboard</a>
</div>

</form>
<script>
setTimeout(() => {
    document.querySelectorAll('.flash').forEach(el => {
        el.style.transition = "opacity 0.5s ease";
        el.style.opacity = "0";

        setTimeout(() => {
            el.remove();
        }, 500);
    });
}, 2000); // ⏱️ stays for 2 seconds
</script>
</body>
</html>
