<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#000000,#020617);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

/* CARD */
.card{
background:#020617;
padding:30px;
border-radius:20px;
width:320px;
border:2px solid white;
box-shadow:0px 0px 40px #af80d5;
transition:0.3s;
}

.card:hover{
box-shadow:0px 0px 70px #af80d5;
transform:scale(1.02);
}

/* TITLE */
h2{
text-align:center;
}

/* INPUT */
.input-box{
position:relative;
margin-top:15px;
}

.input-box input{
width:100%;
padding:12px;
border:none;
outline:none;
border-radius:10px;
background:#0f172a;
color:white;
z-index:2;
position:relative;
}

/* ANIMATED BORDER */
.input-box::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border-radius:10px;
padding:2px;
background:linear-gradient(270deg,#38bdf8,#af80d5,#38bdf8);
background-size:400% 400%;
z-index:1;
opacity:0;
transition:0.3s;
}

.input-box:focus-within::before{
opacity:1;
animation:glow 3s linear infinite;
}

@keyframes glow{
0%{background-position:0%}
100%{background-position:400%}
}

/* BUTTON */
button{
width:100%;
margin-top:20px;
padding:12px;
border:none;
border-radius:10px;
background:#af80d5;
color:white;
cursor:pointer;
transition:0.3s;
box-shadow:0px 0px 10px #dbdbdb;
}

button:hover{
transform:scale(1.05);
background:#c89df0;
box-shadow:0px 0px 25px #ffffff;
}

/* LINKS */
.links{
margin-top:15px;
text-align:center;
}


.links a{
color:#af80d5;
text-decoration:none;
}
.flash-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
}

.flash {
    background: #111;
    color: #fff;
    padding: 12px 18px;
    margin-bottom: 10px;
    border-radius: 8px;
    font-size: 14px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    animation: slideIn 0.3s ease;
}

@keyframes slideIn {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
}
.links a:hover{
text-decoration:underline;
}

/* MOBILE */
@media(max-width:400px){
.card{
width:90%;
}
}

/* ===== BOTTOM EDGE GLOW ===== */

body::after {
  content: "";
  position: fixed;
  bottom: -40px;
  left: 50%;
  transform: translateX(-50%);

  width: 120%;
  height: 120px;

  pointer-events: none;
  z-index: 0;

  background: radial-gradient(
    ellipse at bottom,
    rgba(255,255,255,0.08),
    rgba(168, 85, 247, 0.08) 40%,
    transparent 70%
  );

  filter: blur(35px);
}



</style>
</head>

<body>
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="flash-container">
      {% for message in messages %}
        <div class="flash">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}
<div class="card">
<h2>Login</h2>

<form method="POST">

<div class="input-box">
<input name="username" placeholder="Username" required>
</div>

<div class="input-box">
<input type="password" name="password" placeholder="Password" required>
</div>

<button>Login</button>

</form>

<div class="links">
<a href="/register">Create Account</a><br>
<a href="/forgot">Forgot Password</a>
</div>

</div>
<script>
setTimeout(() => {
    document.querySelectorAll('.flash').forEach(el => {
        el.style.transition = "opacity 0.5s ease";
        el.style.opacity = "0";

        setTimeout(() => {
            el.remove();
        }, 500);
    });
}, 2000); // ⏱️ stays for 2 seconds
</script>
</body>
</html>
